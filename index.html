    <style>
        body {
            max-width: 100%;
            padding: 0;
            margin: 0;
            overflow-x: hidden;
            background: #0a0a0f;
        }

        nav a {
            color: #00fcb5;
            text-shadow: 0 0 8px rgba(0, 252, 181, 0.4);
            font-family: 'Fira Code', monospace;
            font-size: 12px;
        }

        nav a:hover {
            color: #fff;
            text-shadow: 0 0 14px rgba(0, 252, 181, 0.7);
            background: transparent;
        }

        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            overflow: hidden;

        }

    
        .video-bg video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        .landing-content {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 80px 20px 40px;
        }

        .terminal {
            background: rgba(5, 5, 12, 0.88);
            border: 0.75px solid #00fcb5;
            box-shadow:
                0 0 20px rgba(0, 252, 181, 0.1),
                0 0 60px rgba(0, 252, 181, 0.05),
                inset 0 0 40px rgba(0, 0, 0, 0.4);
            max-width: 700px;
            width: 100%;
            font-family: 'Fira Code', 'JetBrains Mono', 'Roboto Mono', monospace;
            animation: fadeIn 1.2s ease-out;
        }

        .terminal-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-bottom: 1px solid rgba(0, 252, 181, 0.2);
            background: rgba(0, 252, 181, 0.03);
        }

        .terminal-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 1px solid;
        }

        .terminal-title {
            /* align at centre of the terminal-bar */
            display: flex;
            margin-left: auto;
            color: #00fcb5;
            font-size: 1em;

        }

        .terminal-dot:nth-child(1) { border-color: #ff5f57; background: rgba(255, 95, 87, 0.25); }
        .terminal-dot:nth-child(2) { border-color: #febc2e; background: rgba(254, 188, 46, 0.25); }
        .terminal-dot:nth-child(3) { border-color: #28c840; background: rgba(40, 200, 64, 0.25); }

        .terminal-body {
            padding: 28px 32px;
        }

        /* h1 → neon title */
        .terminal-body h1 {
            font-family: 'Fira Code', monospace;
            font-size: 1.5em;
            font-weight: 700;
            color: #00fcb5;

            margin: 0 0 2px;
        }

        /* h3 → neon purple section labels */
        .terminal-body h3 {
            color: #9058f8;
            text-shadow: 0 0 8px rgba(144, 88, 248, 0.35);
            font-family: 'Fira Code', monospace;
            font-weight: 600;
            font-size: 0.88em;
            margin: 18px 0 8px;
            letter-spacing: 0.5px;
        }

        /* blockquote → green prompt line */
        .terminal-body blockquote {
            border-left: none;
            padding: 0;
            margin: 0 0 5px;
            color: #00fc50;
            text-shadow: 0 0 6px rgba(0, 252, 80, 0.35);
            font-style: normal;
            font-size: 0.8em;
            line-height: 1.65;
        }

        .terminal-body blockquote p { color: inherit; }

        /* em → muted comment */
        /* overlay 1 from catppuccin - frappe */
        .terminal-body em {
            color: #838ba7;
            font-style: italic;
        }

        /* strong → neon green highlight */
        .terminal-body strong {
            color: #00fc50;
            text-shadow: 0 0 6px rgba(0, 252, 80, 0.35);
            font-weight: 600;
        }

        /* inline code → neon cyan highlight */
        .terminal-body code {
            color: #00fcb5;
            text-shadow: 0 0 6px rgba(0, 252, 181, 0.35);
            background: none;
            padding: 0;
            font-family: inherit;
            font-size: inherit;
        }

        .terminal-body p {
            margin-bottom: 5px;
            font-size: 0.8em;
            line-height: 1.65;
            color: #c6d0f5;
        }

        .terminal-body a {
            color: #838ba7;
            text-decoration: none;
            transition: all 0.2s;
        }

        .terminal-body a:hover {
            color: #00fcb5;
            text-shadow: 0 0 8px rgba(0, 252, 181, 0.5);
            text-decoration: underline;
            background: transparent;
        }

        .terminal-body hr {
            border: none;
            border-top: 1px solid rgba(0, 252, 181, 0.12);
            margin: 14px 0;
        }

        .cursor-blink {
            display: inline-block;
            width: 8px;
            height: 14px;
            background: #00fcb5;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 4px;
            /* box-shadow: 0 0 6px rgba(0, 252, 181, 0.5); */
        }

        .spinner::after {
            content: '|';
            display: inline-block;
            color: #585b70;
            font-family: 'Fira Code', monospace;
            animation: spin 0.6s steps(4, end) infinite;
        }

        @keyframes spin {
            0%   { content: '|'; }
            25%  { content: '/'; }
            50%  { content: '—'; }
            75%  { content: '\\'; }
            100% { content: '|'; }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 18px;
        }

        .nav-row a {
            color: #00fcb5;
            font-size: 0.78em;
            text-decoration: none;
            border: 1px solid rgba(0, 252, 181, 0.25);
            padding: 4px 14px;
            transition: all 0.25s;
        }

        .nav-row a:hover {
            background: rgba(0, 252, 181, 0.08);
            border-color: #00fcb5;
            /* box-shadow: 0 0 10px rgba(0, 252, 181, 0.25); */
            /* no text underline */
            text-decoration: none;
            /* color: #fff; */
        }

        .terminal-body .syntax {
            color: #949cbb;
            opacity: 0.4;
            font-style: normal;
            font-weight: 300;
            text-shadow: none;
        }

        .terminal-body .syntax-url {
            word-break: break-all;
        }

        .terminal-body .md-hr {
            margin: 14px 0;
            /* font-size: 0.8em; */
            line-height: 1.65;
        }

        .terminal-body .contact {
            color: #585b70;
        }

        .terminal-body .contact a {
            color: #838ba7;
        }

        .terminal-body .contact a:hover {
            color: #00fcb5;
        }

            .terminal-body { padding: 20px 16px; }
            .terminal-body h1 { font-size: 1.15em; }

<body>
    <header>

    <div class="video-bg">

    <script>
        function renderBlock(md) {
            return md.trim().split(/\n\n+/).map(function(block) {
                block = block.trim();
                if (!block) return '';

                if (block === '---')
                    return '<p class="md-hr"><span class="syntax">---</span></p>';

                var hm = block.match(/^(#{1,6})\s+([\s\S]*)/);
                if (hm) {
                    var lvl = hm[1].length;
                    return '<h' + lvl + '><span class="syntax">' + hm[1] + '</span> ' + renderInline(hm[2]) + '</h' + lvl + '>';
                }

                if (block.startsWith('>')) {
                    var text = block.replace(/^>\s?/, '');
                    return '<blockquote><span class="syntax">&gt;</span> ' + renderInline(text) + '</blockquote>';
                }

                if (block.startsWith('<')) return renderInline(block);

                return '<p>' + renderInline(block) + '</p>';
            }).join('\n');
        }

        function renderInline(t) {
            // bold **text** — use &#42; entities so italic pass won't re-match
            t = t.replace(/\*\*(.+?)\*\*/g,
                '<span class="syntax">&#42;&#42;</span><strong>$1</strong><span class="syntax">&#42;&#42;</span>');
            // italic *text* — require non-space adjacent to delimiters
            t = t.replace(/\*([^\s*](?:[^*]*[^\s*])?)\*/g,
                '<span class="syntax">&#42;</span><em>$1</em><span class="syntax">&#42;</span>');
            // inline code `text`
            t = t.replace(/`(.+?)`/g,
                '<span class="syntax">&#96;</span><code>$1</code><span class="syntax">&#96;</span>');
            // links [text](url)
            t = t.replace(/\[(.+?)\]\((.+?)\)/g,
                '<span class="syntax">[</span><a href="$2">$1</a><span class="syntax">](<span class="syntax-url">$2</span>)</span>');
            return t;
        }

        document.addEventListener('DOMContentLoaded', function() {
            var content = document.getElementById('terminal-content');

            var markdown = ''
+ '# adiabatic.garden φ\n\n'
+ 'Hello, I am Yoyo!\n\n'
+ '*physics · neuroscience · cs ∘ agender language · chaos and playfulness* <span class="spinner"></span>\n\n'
+ "I can be hired to work on neurotech software, run quantum mechanical simulations, write documentation or host events." + '\n\n'
+ "I'm a Minerva student physically present on the Stanford campus, reach out for walks, coreading, event hosting and so on at yoyoyuan1729 at gmail dot com" + '\n\n'
+ '---\n\n'
+ '### bookmarks\n\n'
+ '`Nicky Case` as primary influence \n\n'
+ 'Highly rated: `Ben Barres Autobiography`\n\n'
+ "Stanislaw Lem's `Prolegomena to Omnipotence` from Summa Technologiae" + '\n\n'
+ 'Temporary Autonomous Zones\n\n'
+ 'Recently read: Tackling the subsampling problem to infer collective properties from limited data \n\n'
+ "Forgot to read: Shape of a Life"+'\n\n'
+ 'Post-Crystallization from Hormone Hunters\n\n'
+ 'Find me on [curius](https://curius.app/yoyo-yuan) · Older readlogs [here](readlog.html)\n\n'
+ '### quests \n\n'
+ 'Ongoing: Building low-cost microelectrode arrays w/ Eigenlucy [notes](https://adiabaticgarden.substack.com/p/making-low-cost-microelectrode-arrays)\n\n'
+ 'Olfaction with metal oxide sensors [search](https://github.com/exanova-y/synthesis) · [talk](https://youtu.be/jGN_bRmlDQo)\n\n'
+ 'NFC key changer with [currents.fm](https://a.currents.fm)\n\n'
+ 'Multiplayer [arXiv wars](https://youtu.be/ZpNXGqU6-Ro)\n\n'
+ '### notebooks \n\n'
+ '[`4 days in Shanghainese anime ecology!`](https://adiabaticgarden.substack.com/p/4-days-in-shanghainese-anime-ecology)\n\n'
+ '[Huaqiangbei vignette](https://adiabaticgarden.substack.com/p/yoyo-2027)\n\n'
+ '[Science across ja/en/cn](https://adiabaticgarden.substack.com/p/october-readlog)\n\n'
+ '[all writing](writing.html)\n\n'
+ '---\n\n'
+ '<span class="contact">Find me elsewhere on [X](https://x.com/adiabaticgarden) · [substack](https://adiabaticgarden.substack.com/) · <span id="snow-toggle" style="cursor:pointer">❄ brrr, stop Arctic weather</span></span>\n\n'
+ '<div class="nav-row"><a href="writing.html">writing</a><a href="readlog.html">readlog</a><a href="https://exanova.mmm.page">vibes</a></div>';

            content.innerHTML = renderBlock(markdown);

            var snowPaused = false;

            function spawnFlake() {
                if (snowPaused) return;
                var el = document.createElement('span');
                el.textContent = '❄';
                el.style.cssText = 'position:fixed;top:-1em;z-index:3;pointer-events:none;'
                    + 'font-size:' + (8 + Math.random() * 10) + 'px;'
                    + 'left:' + (Math.random() * 100) + 'vw;'
                    + 'opacity:' + (0.15 + Math.random() * 0.2) + ';'
                    + 'color:#c6d0f5;';
                document.body.appendChild(el);

                var y = -20;
                var x = parseFloat(el.style.left);
                var speed = 0.3 + Math.random() * 0.5;
                var drift = (Math.random() - 0.5) * 0.3;
                var limit = window.innerHeight * 0.8;

                function fall() {
                    y += speed;
                    x += drift;
                    el.style.top = y + 'px';
                    el.style.left = x + 'vw';
                    if (y < limit) {
                        requestAnimationFrame(fall);
                    } else {
                        el.style.transition = 'opacity 0.6s';
                        el.style.opacity = '0';
                        setTimeout(function() { el.remove(); }, 600);
                    }
                }
                requestAnimationFrame(fall);
            }

            setInterval(spawnFlake, 400);

            document.getElementById('snow-toggle').addEventListener('click', function() {
                snowPaused = !snowPaused;
                this.textContent = snowPaused ? '❄ introduce Arctic weather' : '❄ brrr, stop Arctic weather';
            });
        });
    </script>
