### Deterioration reading list
*by Yoyo • 2026-02-21*
![img](/assets/images/khruschevka.jpg)

<span id="lavender-txt">Measurements of Decay by K.K. Edin.</span>
Describes speedrun from pure philosophical abstraction to applied quantitative trading. From one person to global company, from unemployed to constantly hustling, from true neutral to neutral evil. Invariant: human misery.

<span id="lavender-txt">The City Coat of Arms</span> Describing a city-scale scope-creep lasting centuries long.

<span id="lavender-txt">Journal of My Other Self</span> Poetically written. Having chronic illness in Germany a writer is life goals!!! I had already written about this in [previous note](https://adiabatic.garden/pages/return-from-relaxation-old).

<span id="lavender-txt">Recoltes et Semailles</span> Scripts written by Grothendieck after voluntarily leaving the field of mathematics. This is interesting to read in comparison with Shape of a Life, Shing Tung Yau's biography where he builds differential geometry infrastructure for 20th century mathematics. Both people lead by intuition, and then rigour. Interestingly, the Recoltes et Semailles translations differ wildly, possibly presenting as feral academic journal...


<span id="lavender-txt">Flowers for Algernon</span> Peak application of stage psychology. I have already ranted about it on [substack](https://adiabaticgarden.substack.com/p/september-readlog), "a direct manifestation of psychometrics and 1950 dominant stage psychology theories" with a hasty ending.

<span id="lavender-txt">Lu, Reshaping by Madeleine Thien</span> Have ranted about this on Twitter ~Sept 2025. Is one a reliable execution-first Asian, or seen as a compliant, passive person devoid of risk-taking? I think I share neural structures with the author.

<span id="lavender-txt">Signs and Symbols Vladimir Nabokov</span> Everything is a cipher, and he is the theme...The silhouette of his blood corpuscles, magnified flit over the vast plains...A colleague said he tried to fly. What he really wanted to do, is to tear a hole in his world and escape. I really just like unreliable narrators. Every time when I befriend a new individual, they're at the edge of what I could cognize. People would fall out of the circle, just like non-fiction unreliable narrators.

 Craving beauty and youth transfers into relationships.

"The beautiful passage—

<span id="quote-txt">At another time he devoted himself entirely to music, and in a long latticed room, with a vermilion-and-gold ceiling and walls of olive-green lacquer, he used to give curious concerts in which mad gipsies tore wild music from little zithers, or grave, yellow-shawled Tunisians plucked at the strained strings of monstrous lutes, while grinning Negroes beat monotonously upon copper drums and, crouching upon scarlet mats, slim turbaned Indians blew through long pipes of reed or brass and charmed—or feigned to charm—great hooded snakes and horrible horned adders. The harsh intervals and shrill discords of barbaric music stirred him at times when Schubert’s grace, and Chopin’s beautiful sorrows, and the mighty harmonies of Beethoven himself, fell unheeded on his ear. He collected together from all parts of the world the strangest instruments that could be found, either in the tombs of dead nations or among the few savage tribes that have survived contact with Western civilizations, and loved to touch and try them. He had the mysterious *juruparis* of the Rio Negro Indians, that women are not allowed to look at and that even youths may not see till they have been subjected to fasting and scourging, and the earthen jars of the Peruvians that have the shrill cries of birds, and flutes of human bones such as Alfonso de Ovalle heard in Chile, and the sonorous green jaspers that are found near Cuzco and give forth a note of singular sweetness. He had painted gourds filled with pebbles that rattled when they were shaken; the long *clarin* of the Mexicans, into which the performer does not blow, but through which he inhales the air; the harsh *ture* of the Amazon tribes, that is sounded by the sentinels who sit all day long in high trees, and can be heard, it is said, at a distance of three leagues; the *teponaztli*, that has two vibrating tongues of wood and is beaten with sticks that are smeared with an elastic gum obtained from the milky juice of plants; the *yotl*-bells of the Aztecs, that are hung in clusters like grapes; and a huge cylindrical drum, covered with the skins of great serpents, like the one that Bernal Diaz saw when he went with Cortes into the Mexican temple, and of whose doleful sound he has left us so vivid a description. The fantastic character of these instruments fascinated him, and he felt a curious delight in the thought that art, like Nature, has her monsters, things of bestial shape and with hideous voices. Yet, after some time, he wearied of them, and would sit in his box at the opera, either alone or with Lord Henry, listening in rapt pleasure to “Tannhauser” and seeing in the prelude to that great work of art a presentation of the tragedy of his own soul.</span>

 I could not make a romance out of Lily’s story.
Could anyone cry for 3 days and 3 nights? What right did I have to tell the boy to express his heartbreak more poetically... 
So many tears, sorrow only dessicated me, tears came to an end, dessication persisted.

<span id="lavender-txt">Confessions of a Shinagawa Monkey </span> Ultimate love, ultimate loneliness.

<span id="quote-txt">Maybe this feeling is just a moment of hormonal adolescence. In two or three years, she might be stable, working part-time at a café and aiming for vocational school. Maybe she’ll attend night school, surrounded by friends with similar sensibilities. By 18, she could be a perfectly ordinary woman, adapted to society. Her chest fuller, her bones harder, these toy-sized lolita clothes wouldn’t fit anymore. What we reject now might just be a passing confusion, and she may never wear frills again.</span> 

<span id="quote-txt">“They taught us only cute, beautiful things. But once my chest started to grow, everyone’s eyes changed. Suddenly sex and romance became normal topics, gross ones. No one thinks it’s strange. Girls are expected to accept crude words from boys, and if you get angry you’re told you’re no fun. Common sense gets rewritten into vulgarity and everyone accepts it. No one keeps dolls anymore. When they’re lonely, they talk to someone of the opposite sex through their phone.”</span>

 The idea is not novel, but the English translation is just like insane Chinese literature.
