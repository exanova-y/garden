<script>

*by: Aditya Mahes, Noorish Rizvi, Shirley Yang, Yoyo Yuan • 2022-03-24*

My team's submission to the United Nations Environmental Programme challenge got top 5 out of 40 competing teams. It was an intense few weeks gathering data, outreaching to experts, resolving team conflicts and prepping for AP exams. Our deliverable is a 27-page [slide deck](https://docs.google.com/presentation/d/1t20SKMD6kbZImYeuDZ3PFODNWmN741BqehsEFmDDTZg/edit?usp=sharing)`;
