The party never stopped. Every morning D’Annunzio read poetry and manifestos from his balcony; every evening a concert, then fireworks. This made up the entire activity of the government. Eighteen months later, when the wine and money had run out and the Italian fleet *finally* showed up and lobbed a few shells at the Municipal Palace, no one had the energy to resist.
