<!DOCTYPE html>
<!-- KaTeX requires the use of the HTML5 doctype. Without it, KaTeX may not render properly -->
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topics of interest </title>
    <link rel="stylesheet" href="../css/style.css">
    <!-- Include the marked.js library for markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/navigation.js"></script>
    <script src="../js/markdown.js"></script>

    <!--  latex stuff -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.25/dist/katex.min.css" integrity="sha384-WcoG4HRXMzYzfCgiyfrySxx90XSl2rxY5mnVY5TwtWE6KLrArNKn0T/mOgNL0Mmi" crossorigin="anonymous">

    <!-- The loading of KaTeX is deferred to speed up page rendering -->
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.25/dist/katex.min.js" integrity="sha384-J+9dG2KMoiR9hqcFao0IBLwxt6zpcyN68IgwzsCSkbreXUjmNVRhPFTssqdSGjwQ" crossorigin="anonymous"></script>

    <!-- To automatically render math in text elements, include the auto-render extension: -->
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.25/dist/contrib/auto-render.min.js" integrity="sha384-hCXGrW6PitJEwbkoStFjeJxv+fSOOQKOPbJxSfM6G5sWZjAyWhXiTIIAmQqnlLlh" crossorigin="anonymous"
        onload="renderMathInElement(document.body);"></script>
  </head>

    <body>
        <header>
            <nav><ul><!-- Navigation items will be populated by JavaScript --></ul></nav>
        </header>

        <main>
            <section class="post">
                <div id="content" class="markdown-content">
                    <!-- Content will be loaded here -->
                    <p>Loading content...</p>
                </div>
                <div class="post-navigation">
                    <div class="back-link-container"><a href="../writing.html" class="back-link">← Back to all posts</a></div>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2025 Yoyo cat!</p>
        </footer>
    </body>


    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const content = document.getElementById('content');
            
            // The markdown content embedded directly in the page
            const markdown = `
### Topics of interest
*by Yoyo Yuan • 2026-02-20*   
           
until 2023:
quantum computing, quantum mechanics, astrophysics, cosmology, philosophy, psychology, writing

after 2025:
theoretical neuroscience, pcb design, 3d modelling (cad), programming, psychology, philosophy, literature of deterioration

surrounding topics:
urban infrastructure, startups, free pizza

random facts:
Once a competitive flag guesser!
Countries I'd consider moving to: Germany, Japan, Switzerland, China, Canada, Finland, Singapore


`;
            
            // Render the markdown to HTML using marked.js
            content.innerHTML = marked.parse(markdown);
        });
    </script>
</html>
